services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SOMNIA_RPC_URL: ${NEXT_PUBLIC_SOMNIA_RPC_URL:-https://api.infra.testnet.somnia.network/}
        NEXT_PUBLIC_SOMNIBOUNTY_ADDRESS: ${NEXT_PUBLIC_SOMNIBOUNTY_ADDRESS:-}
        NEXT_PUBLIC_VULNERABILITY_REGISTRY_ADDRESS: ${NEXT_PUBLIC_VULNERABILITY_REGISTRY_ADDRESS:-}
    image: somnibounty-web:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SOMNIA_RPC_URL: ${NEXT_PUBLIC_SOMNIA_RPC_URL:-https://api.infra.testnet.somnia.network/}
      NEXT_PUBLIC_SOMNIBOUNTY_ADDRESS: ${NEXT_PUBLIC_SOMNIBOUNTY_ADDRESS:-}
      NEXT_PUBLIC_VULNERABILITY_REGISTRY_ADDRESS: ${NEXT_PUBLIC_VULNERABILITY_REGISTRY_ADDRESS:-}
      SOMNIA_RPC_URL: ${SOMNIA_RPC_URL:-https://api.infra.testnet.somnia.network/}
      SOMNIBOUNTY_ADDRESS: ${SOMNIBOUNTY_ADDRESS:-}
      VULNERABILITY_REGISTRY_ADDRESS: ${VULNERABILITY_REGISTRY_ADDRESS:-}
      PINATA_JWT: ${PINATA_JWT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CODE_MODEL: ${OPENAI_CODE_MODEL:-gpt-5.2-codex}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
