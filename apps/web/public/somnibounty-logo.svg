<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SomniBounty AI logo</title>
  <desc id="desc">Shield checkmark with agent circuit nodes and bounty coin beside SomniBounty AI wordmark.</desc>
  <defs>
    <linearGradient id="mark" x1="40" y1="34" x2="236" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CFFD0"/>
      <stop offset="0.48" stop-color="#49F7A9"/>
      <stop offset="1" stop-color="#5EE7FF"/>
    </linearGradient>
    <linearGradient id="word" x1="298" y1="82" x2="832" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3FFF9"/>
      <stop offset="0.55" stop-color="#D7FFF2"/>
      <stop offset="1" stop-color="#7EF6D2"/>
    </linearGradient>
    <radialGradient id="coin" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(198 206) rotate(90) scale(39)">
      <stop stop-color="#FFF4B8"/>
      <stop offset="0.55" stop-color="#F0CD6E"/>
      <stop offset="1" stop-color="#8D6818"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.286 0 0 0 0 0.969 0 0 0 0 0.663 0 0 0 0.46 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="960" height="280" rx="40" fill="#02050A"/>
  <circle cx="94" cy="70" r="96" fill="#49F7A9" opacity="0.13"/>
  <circle cx="252" cy="232" r="120" fill="#5EE7FF" opacity="0.10"/>

  <g filter="url(#glow)">
    <path d="M139 34L219 67.5V132C219 191 188 235 139 260C90 235 59 191 59 132V67.5L139 34Z" fill="#06110F" fill-opacity="0.92" stroke="url(#mark)" stroke-width="13" stroke-linejoin="round"/>
    <path d="M96 143L127 173L184 106" stroke="#F4FFFA" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M39 94H20" stroke="#A48BFF" stroke-width="7"/>
    <circle cx="15" cy="94" r="10" stroke="#A48BFF" stroke-width="7"/>
    <path d="M39 128H18" stroke="#49F7A9" stroke-width="7"/>
    <circle cx="14" cy="128" r="10" stroke="#49F7A9" stroke-width="7"/>
    <path d="M239 94H259" stroke="#5EE7FF" stroke-width="7"/>
    <circle cx="264" cy="94" r="10" stroke="#5EE7FF" stroke-width="7"/>
    <path d="M239 128H262" stroke="#49F7A9" stroke-width="7"/>
    <circle cx="267" cy="128" r="10" stroke="#49F7A9" stroke-width="7"/>
  </g>

  <circle cx="199" cy="212" r="38" fill="url(#coin)" stroke="#FFEAA3" stroke-width="6"/>
  <circle cx="199" cy="212" r="22" fill="#07110F" fill-opacity="0.9"/>
  <path d="M199 188V235M181 202H211M181 221H211" stroke="#F0CD6E" stroke-width="8" stroke-linecap="round"/>

  <text x="308" y="128" fill="url(#word)" font-family="Unbounded, Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="0">SomniBounty AI</text>
  <text x="312" y="174" fill="#7E99B0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="600" letter-spacing="0">Autonomous security triage + bounty escrow on Somnia</text>
  <text x="312" y="214" fill="#49F7A9" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="2.2">OBSERVE -> VERIFY -> PAY</text>
</svg>
