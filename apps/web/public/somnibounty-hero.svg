      <rect x="140" y="118" width="118" height="23" rx="11.5" fill="#FFD166" fill-opacity="0.13" stroke="#FFD166" stroke-opacity="0.35"/>
      <text x="157" y="135" fill="#FFD166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">4.2 STT</text>
    </g>
