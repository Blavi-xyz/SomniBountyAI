<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SomniBounty AI security bounty dashboard hero</title>
  <desc id="desc">A dark security operations dashboard showing agent verification, onchain incidents, and bounty escrow payout flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07110E"/>
      <stop offset="0.45" stop-color="#0B1F27"/>
      <stop offset="1" stop-color="#151023"/>
    </linearGradient>
    <linearGradient id="panel" x1="84" y1="80" x2="1196" y2="494" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10201D" stop-opacity="0.96"/>
      <stop offset="0.58" stop-color="#101A25" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#18142A" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="green" x1="180" y1="100" x2="1050" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67F7B1"/>
      <stop offset="1" stop-color="#36B7FF"/>
    </linearGradient>
    <linearGradient id="amber" x1="720" y1="170" x2="1080" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD166"/>
      <stop offset="1" stop-color="#FF7A59"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="560" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="190" fill="#1AF0A0" opacity="0.13" filter="url(#soft)"/>
  <circle cx="1040" cy="430" r="220" fill="#5E5BFF" opacity="0.18" filter="url(#soft)"/>
  <circle cx="980" cy="110" r="170" fill="#FFB020" opacity="0.09" filter="url(#soft)"/>

