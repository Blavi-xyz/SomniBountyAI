    <text x="46" y="158" fill="#F6FFFB" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="800">4.2 STT</text>

    <rect x="26" y="196" width="254" height="56" rx="16" fill="url(#amber)" fill-opacity="0.18" stroke="#FFD166" stroke-opacity="0.38"/>
