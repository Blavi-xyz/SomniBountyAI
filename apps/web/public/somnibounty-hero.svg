    <text x="205" y="31" fill="#7FA69D" font-family="JetBrains Mono, Consolas, monospace" font-size="14">IncidentOpened</text>
    <text x="405" y="31" fill="#7FA69D" font-family="JetBrains Mono, Consolas, monospace" font-size="14">FixSubmitted</text>
    <text x="585" y="31" fill="#7FA69D" font-family="JetBrains Mono, Consolas, monospace" font-size="14">VerificationRequested</text>
    <text x="840" y="31" fill="#91EFD1" font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="800">BountyPaid</text>
